---
monitoring_snmp_community: REPLACE_WITH_VAULTED_SNMP_COMMUNITY

blackbox_exporter_modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      method: GET
      preferred_ip_protocol: ip4
  icmp:
    prober: icmp
    timeout: 5s

snmp_exporter_auths:
  public_v2:
    community: "{{ monitoring_snmp_community }}"
    version: 2

snmp_exporter_modules:
  if_mib:
    walk:
      - 1.3.6.1.2.1.2
      - 1.3.6.1.2.1.31
    version: 2
    auth: public_v2
