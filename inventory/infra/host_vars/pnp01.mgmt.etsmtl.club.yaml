pnp_server_backend:
  enabled: true
  bind:
    address: "127.0.0.1"
    port: 9191
  base_dir: /var/lib/cisco-pnp
  bundle_dir: "{{ pnp_server_backend.base_dir }}/pnp"
  git:
    repo: https://github.com/GreatSymphonia/pnp-server.git
    version: main
    checkout_dir: "{{ pnp_server_backend.base_dir }}/src/pnp-server"
  user: pnp
  group: pnp
  venv_dir: "{{ pnp_server_backend.base_dir }}/venv"
  log_dir: "{{ pnp_server_backend.base_dir }}/log"
  log_file: "{{ pnp_server_backend.log_dir }}/pnp_debug.log"
  script_path: "{{ pnp_server_backend.bundle_dir }}/open-pnp.py"
  config_path: "{{ pnp_server_backend.bundle_dir }}/open-pnp.toml"
  images_path: "{{ pnp_server_backend.bundle_dir }}/images.toml"
  service_name: pnp-server
  pip_packages:
    - flask
    - xmltodict
    - requests
    - ifaddr
    - tomli

pnp_server_tls:
  enabled: false
  selfsigned: false
  days: 3650
  cert: /etc/nginx/certs/cisco-pnp.crt
  key: /etc/nginx/certs/cisco-pnp.key
