pnp_server_http:
  docroot: /var/www/cisco-pnp
  device_map_path: /var/lib/cisco-pnp/device-map.yaml
  profiles_src_dir: /var/lib/cisco-pnp/profiles
  public_host: "{{ ansible_default_ipv4.address }}"
  image_url: "http://{{ pnp_server_http.public_host }}:{{ pnp_server_http.listen.port }}/images"
  config_url: "http://{{ pnp_server_http.public_host }}:{{ pnp_server_http.listen.port }}/configs"
  listen:
    address: "0.0.0.0"
    port: 8080
  install_nginx: true
  nginx_service_name: nginx

