- name: Configure Forgejo Runners
  hosts: forgejo-runners
  gather_facts: false
  become: true
  become_method: sudo
  tasks:
    - name: Ensure apt cache is updated
      ansible.builtin.include_role:
        name: cedille.docker.install

    - name: Create act_runner configuration directory
      ansible.builtin.file:
        path: /opt/act_runner
        state: directory
        mode: "0755"
        owner: root
        group: root

    - name: Create data directory for act_runner
      ansible.builtin.file:
        path: /opt/act_runner/data
        state: directory
        mode: "0777"
        owner: root
        group: root

    - name: Prepare act_runner configuration
      ansible.builtin.copy:
        src: files/config.yaml
        dest: /opt/act_runner/config.yaml
        mode: "0644"
        owner: root
        group: root

    - name: Fetch Forgejo registration token for runners
      ansible.builtin.uri:
        url: "{{ hostvars['forgejo_api_url'] }}/api/v1/admin/runners/registration-token"
        method: GET
        headers:
          Authorization: "token {{ hostvars['forgejo_api_token'] }}"
          Accept: "application/json"
        return_content: true
      register: forgejo_token_response
      when: hostvars['forgejo_api_token'] is defined

    - name: Set fact for runner token
      ansible.builtin.set_fact:
        global_runner_token: "{{ forgejo_token_response.json.token if hostvars['forgejo_api_token'] is defined }}"

    - name: Generate .runner file via standard registration
      ansible.builtin.command: >
        docker run --rm -v /opt/act_runner/data:/data -w /data code.forgejo.org/forgejo/runner:12
        forgejo-runner register --no-interactive
        --instance {{ hostvars['forgejo_api_url'] }}
        --token {{ hostvars['global_runner_token'] }}
        --name {{ inventory_hostname }}
      args:
        creates: /opt/act_runner/data/.runner

    - name: Deploy Forgejo runner Docker container
      community.docker.docker_container:
        name: forgejo-act-runner
        image: code.forgejo.org/forgejo/runner:12
        state: started
        restart_policy: always
        privileged: true
        command: ["forgejo-runner", "daemon", "--config", "/config.yaml"]
        volumes:
          - /opt/act_runner/config.yaml:/config.yaml:ro
          - /opt/act_runner/data:/data
          - /var/run/docker.sock:/var/run/docker.sock
