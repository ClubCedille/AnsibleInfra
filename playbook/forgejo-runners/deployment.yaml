---
- name: Provision dynamic Forgejo Runner VMs
  hosts: forgejo
  connection: local
  gather_facts: false
  tasks:
    - name: Create VM for each runner config
      ansible.builtin.include_role:
        name: cedille.proxmox.vm
      vars:
        vm_id: "{{ item.id }}"
        vm_name: "{{ item.name }}"
        vm_proxmox_node: "{{ item.node }}"
        vm_cpu_cores: "{{ item.cpu_cores | default(vm_default_cpu_cores) }}"
        vm_memory_mb: "{{ item.memory_mb | default(vm_default_memory_mb) }}"
        vm_net: "{{ vm_default_net | combine({'ip': item.ip}) }}"
        vm_user: "{{ vm_default_user }}"
        vm_password: "{{ vm_default_password }}"
        vm_disk_image_path: "{{ vm_default_disk_image_path }}"
        vm_disk_storage: "{{ vm_default_disk_storage }}"
        vm_disk_format: "{{ vm_default_disk_format | default('qcow2') }}"
        vm_disk_size: "{{ vm_default_disk_size | default('30G') }}"
      loop: "{{ forgejo_instances | default([]) }}"
      loop_control:
        loop_var: item

    - name: Add provisioned VMs to inventory dynamically
      ansible.builtin.add_host:
        name: "{{ item.name }}"
        groups: dynamic_forgejo_runners
        ansible_host: "{{ item.ip }}"
        ansible_user: "{{ vm_default_user }}"
        ansible_password: "{{ vm_default_password }}"
      loop: "{{ forgejo_instances | default([]) }}"
      loop_control:
        loop_var: item

- name: Retrieve Forgejo Runner Token
  hosts: forgejo
  connection: local
  gather_facts: false
  tasks:
    - name: Fetch Forgejo registration token for runners
      ansible.builtin.uri:
        url: "{{ forgejo_api_url }}/api/v1/admin/runners/registration-token"
        method: GET
        headers:
          Authorization: "token {{ forgejo_api_token }}"
          Accept: "application/json"
        return_content: true
      register: forgejo_token_response
      when: forgejo_api_token is defined

    - name: Set fact for runner token
      ansible.builtin.set_fact:
        global_runner_token: "{{ forgejo_token_response.json.token if forgejo_api_token is defined else forgejo_runner_token }}"

- name: Configure Forgejo Runners
  hosts: dynamic_forgejo_runners
  gather_facts: true
  become: true
  tasks:
    - name: Ensure apt cache is updated
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install Docker and requirements
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
          - python3-docker
        state: present

    - name: Ensure Docker service is started and enabled
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Create act_runner configuration directory
      ansible.builtin.file:
        path: /opt/act_runner
        state: directory
        mode: "0755"
        owner: root
        group: root

    - name: Create data directory for act_runner
      ansible.builtin.file:
        path: /opt/act_runner/data
        state: directory
        mode: "0777"
        owner: root
        group: root

    - name: Prepare act_runner configuration
      ansible.builtin.copy:
        src: files/config.yaml
        dest: /opt/act_runner/config.yaml
        mode: "0644"
        owner: root
        group: root

    - name: Generate .runner file via standard registration
      ansible.builtin.command: >
        docker run --rm -v /opt/act_runner/data:/data -w /data code.forgejo.org/forgejo/runner:12
        forgejo-runner register --no-interactive
        --instance {{ hostvars['forgejo']['forgejo_api_url'] }}
        --token {{ hostvars['forgejo']['global_runner_token'] }}
        --name {{ inventory_hostname }}
      args:
        creates: /opt/act_runner/data/.runner

    - name: Deploy Forgejo runner Docker container
      community.docker.docker_container:
        name: forgejo-act-runner
        image: code.forgejo.org/forgejo/runner:12
        state: started
        restart_policy: always
        privileged: true
        command: ["forgejo-runner", "daemon", "--config", "/config.yaml"]
        volumes:
          - /opt/act_runner/config.yaml:/config.yaml:ro
          - /opt/act_runner/data:/data
          - /var/run/docker.sock:/var/run/docker.sock
