---
- name: Copy ssh key to Local
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Ensure .ssh directory exists
      ansible.builtin.file:
        path: ~/.ssh
        state: directory
        mode: "0700"
    - name: Copy SSH private key to local machine
      ansible.builtin.copy:
        src: ../../ansible-key/id_rsa_clubs
        dest: ~/.ssh/id_rsa_clubs
        mode: "0600"
